<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name — Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #aaa;
      max-width: 600px;
    }

    .projects {
      margin-top: 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .project {
      border-top: 1px solid #333;
      padding-top: 20px;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .project:hover {
      opacity: 0.6;
    }

    .project h2 {
      margin: 0;
      font-size: 28px;
    }

    .footer {
      margin-top: 100px;
      font-size: 14px;
      color: #666;
    }

    @media(max-width: 768px){
      h1 { font-size: 40px; }
      .projects { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>
      Your Name<br/>
      Senior Designer
    </h1>

    <p>
      I create brand identities, digital experiences, and campaigns that connect strategy with strong visual storytelling.
    </p>

    <div class="projects">
      <div class="project">
        <h2>Project One</h2>
        <p>Brand identity & campaign</p>
      </div>

      <div class="project">
        <h2>Project Two</h2>
        <p>UX & product design</p>
      </div>
    </div>

    <div class="footer">
      © 2026 — Your Name
    </div>
  </div>
</body>
</html>
